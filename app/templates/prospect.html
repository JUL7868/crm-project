<!-- FILE: /app/templates/prospect.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prospect</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900">

    <!-- Header -->
    <header class="bg-white shadow-md sticky top-0 z-10">
        <div class="max-w-3xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="/" class="text-sm text-gray-600 hover:text-black">← Back</a>
            <h1 class="text-lg font-semibold">Prospect</h1>
            <a href="/add" class="text-sm px-3 py-2 bg-blue-600 text-white rounded-lg">+ Add</a>
        </div>
    </header>

    <!-- Main -->
    <main class="max-w-3xl mx-auto px-4 py-6 space-y-6">

        <!-- Prospect Info -->
        <div class="bg-white p-5 rounded-xl shadow-sm">
            <h2 class="text-xl font-semibold">{{ p.name }}</h2>

            <div class="mt-3 space-y-1 text-sm text-gray-600">
                <p><span class="font-medium text-gray-800">Status:</span> {{ p.status }}</p>
                <p><span class="font-medium text-gray-800">Next Action:</span> {{ p.next_action or "None" }}</p>
            </div>
        </div>

        <!-- Add Note -->
        <div class="bg-white p-5 rounded-xl shadow-sm">
            <h3 class="font-semibold mb-3">Add Note</h3>
            <form method="POST" action="/add_note/{{ p.id }}" class="space-y-3">
                <input 
                    type="text" 
                    name="note" 
                    placeholder="Enter note"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                <button 
                    type="submit"
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700 transition"
                >
                    Add Note
                </button>
            </form>
        </div>

        <!-- Update Status -->
        <div class="bg-white p-5 rounded-xl shadow-sm">
            <h3 class="font-semibold mb-3">Update Status</h3>
            <form method="POST" action="/update_status/{{ p.id }}" class="space-y-3">
                <select 
                    name="status"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                    <option value="new">new</option>
                    <option value="contacted">contacted</option>
                    <option value="qualified">qualified</option>
                    <option value="won">won</option>
                    <option value="lost">lost</option>
                </select>
                <button 
                    type="submit"
                    class="w-full bg-green-600 text-white py-2 rounded-lg font-medium hover:bg-green-700 transition"
                >
                    Update Status
                </button>
            </form>
        </div>

        <!-- Set Follow-Up -->
        <div class="bg-white p-5 rounded-xl shadow-sm">
            <h3 class="font-semibold mb-3">Set Follow-Up</h3>
            <form method="POST" action="/set_followup/{{ p.id }}" class="space-y-3">
                <input 
                    type="text" 
                    name="date" 
                    placeholder="YYYY-MM-DD HH:MM"
                    class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
                <button 
                    type="submit"
                    class="w-full bg-yellow-500 text-white py-2 rounded-lg font-medium hover:bg-yellow-600 transition"
                >
                    Set Follow-Up
                </button>
            </form>
        </div>

        <!-- Notes -->
        <div class="bg-white p-5 rounded-xl shadow-sm">
            <h3 class="font-semibold mb-3">Notes</h3>

            {% if p.notes %}
                <div class="space-y-3">
                    {% for n in p.notes %}
                    <div class="border-l-4 border-gray-300 pl-3">
                        <p class="text-sm">{{ n.text }}</p>
                        <p class="text-xs text-gray-500 mt-1">{{ n.timestamp }}</p>
                    </div>
                    {% endfor %}
                </div>
            {% else %}
                <p class="text-sm text-gray-500">(no notes)</p>
            {% endif %}
        </div>

    </main>

</body>
</html>
