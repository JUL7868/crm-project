<!DOCTYPE html>
<html>
<head>
    <title>Clients</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-900">

<!-- NAVBAR -->
<div class="bg-white shadow-sm p-4 flex justify-between items-center">
    <h1 class="text-xl font-semibold">Clients</h1>

    <div class="flex gap-2">
        <a href="/" class="px-3 py-2 bg-gray-200 rounded">Dashboard</a>
        <a href="/add_prospect" class="px-3 py-2 bg-blue-600 text-white rounded">+ Add Prospect</a>
    </div>
</div>

<div class="max-w-md md:max-w-4xl mx-auto p-4">

    <!-- SEARCH -->
    <form method="GET" action="/clients" class="mb-4">
        <input
            type="text"
            name="q"
            value="{{ query }}"
            placeholder="Search name, company, follow-up..."
            class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-500"
        >
    </form>

    <!-- RESULTS -->
    {% for p in clients %}
    <a href="/prospect/{{ p.id }}">
        <div class="bg-white rounded-lg shadow mb-3 p-4 hover:bg-gray-50 transition">

            <!-- LINE 1: NAME + COMPANY -->
            <div class="font-semibold text-lg">
                {{ p.name }} — {{ p.company or "No company" }}
            </div>

            <!-- LINE 2: FOLLOW-UP -->
            {% if p.follow_up %}
            <div class="text-sm text-gray-600 mt-1">
                Follow-up: {{ p.follow_up }}
            </div>
            {% else %}
            <div class="text-sm text-gray-400 mt-1">
                No follow-up scheduled
            </div>
            {% endif %}

            <!-- LINE 3: STATUS -->
            <div class="text-xs text-gray-400 mt-1">
                Status: {{ p.status }}
            </div>

        </div>
    </a>
    {% endfor %}

    {% if not clients %}
    <div class="text-gray-500 text-sm">
        No results found.
    </div>
    {% endif %}

</div>

</body>
</html>
